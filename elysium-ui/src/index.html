<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elysium Engine</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="app-container">
        <header class="player-header">
            <div id="brand-text" class="brand"></div>
            <div class="track-info">
                <h2 id="trackTitle">---</h2>
                <span id="engineStatus" class="badge standby">---</span>
            </div>
        </header>

        <section class="progress-section">
            <div class="time-label" id="timeCurrent">00:00</div>
            <div class="progress-track">
                <div id="progressBar" class="progress-fill"></div>
            </div>
            <div class="time-label" id="timeTotal">00:00</div>
        </section>

        <footer class="player-controls">
            <button class="btn btn-secondary" id="btn-skip">---</button>
            <button class="btn btn-primary" id="playPauseBtn">---</button>
            <button class="btn btn-secondary" id="btn-settings">---</button>
        </footer>
    </div>

    <script type="module" src="main.js"></script>
</body>
</html>
