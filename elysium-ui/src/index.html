<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elysium Premium</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app-shell">
        <aside id="shell-sidebar">
            <div class="brand-zone">
                <div class="logo-box">Logo</div>
                <span class="app-title">Elysium</span>
            </div>
            <nav id="sidebar-navigation-slots"></nav>
            <div id="sidebar-footer-slots"></div>
        </aside>

        <main id="shell-main-content">
            <div id="content-mount-point"></div>
        </main>

        <footer id="shell-player-bar">
            <div id="player-meta-slot"></div>
            <div id="player-controls-slot"></div>
            <div id="player-utilities-slot"></div>
        </footer>
    </div>

    <script type="module" src="main.js"></script>
</body>
</html>
