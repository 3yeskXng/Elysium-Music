name: "Publish Linux AppImage Release"

on:
  push:
    tags:
      - 'v*'

jobs:
  publish-tauri:
    permissions:
      contents: write
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Rust Stable Toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Initialize Rust Compiler Cache
        uses: swatinem/rust-cache@v2

      - name: Install Linux Build Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev patchelf

      - name: Fetch Linux Node Binary (Sidecar Self-Healing Subsystem)
        run: |
          curl -L https://nodejs.org/dist/v22.12.0/node-v22.12.0-linux-x64.tar.xz -o node.tar.xz
          tar -xf node.tar.xz
          mkdir -p elysium-ui/src-tauri/binaries
          cp node-v22.12.0-linux-x64/bin/node ./node
          cp node-v22.12.0-linux-x64/bin/node ./elysium-ui/node
          cp node-v22.12.0-linux-x64/bin/node ./elysium-ui/src-tauri/binaries/node-x86_64-unknown-linux-gnu
          chmod +x ./node
          chmod +x ./elysium-ui/node
          chmod +x ./elysium-ui/src-tauri/binaries/node-x86_64-unknown-linux-gnu
          rm -rf node.tar.xz node-v22.12.0-linux-x64

      - name: Install Backend Dependencies (Root Scope)
        run: npm install

      - name: Install Frontend & Build Dependencies (UI Scope)
        run: npm install
        working-directory: elysium-ui

      - name: Bundle Frontend and Backend Assets (Modular Compiling)
        run: node build-stage.cjs
        working-directory: elysium-ui
        env:
          NODE_OPTIONS: "--max-old-space-size=4096"

      - name: Build and Publish Tauri Linux AppImage
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPIMAGE_EXTRACT_AND_RUN: 1 
          CARGO_BUILD_JOBS: 2 
          NODE_OPTIONS: "--max-old-space-size=4096" 
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Elysium Linux ${{ github.ref_name }}"
          releaseBody: "Automated Linux production bundle compilation featuring structural self-healing sidecar assets."
          releaseDraft: true
          prerelease: false
          projectPath: "elysium-ui"