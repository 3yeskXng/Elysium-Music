name: "Publish Linux AppImage Release"

on:
  push:
    tags:
      - 'v*'

jobs:
  publish-tauri:
    permissions:
      contents: write
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Rust Stable Toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Initialize Rust Compiler Cache
        uses: swatinem/rust-cache@v2

      - name: Install Linux Build Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev patchelf

      - name: Install Backend Dependencies (Root Scope)
        run: npm install
        env:
          YOUTUBE_DL_SKIP_DOWNLOAD: "true"
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Frontend & Build Dependencies (UI Scope)
        run: npm install
        working-directory: elysium-ui
        env:
          YOUTUBE_DL_SKIP_DOWNLOAD: "true"
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Bundle Frontend Assets
        run: node build-stage.cjs
        working-directory: elysium-ui
        env:
          NODE_OPTIONS: "--max-old-space-size=4096"

      - name: Build and Publish Tauri Linux AppImage
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPIMAGE_EXTRACT_AND_RUN: 1 
          CARGO_BUILD_JOBS: 2 
          NODE_OPTIONS: "--max-old-space-size=4096" 
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Elysium Linux ${{ github.ref_name }}"
          releaseBody: "Automated Linux production bundle compilation. Automated live-runtime architecture configured."
          releaseDraft: true
          prerelease: false
          projectPath: "elysium-ui"